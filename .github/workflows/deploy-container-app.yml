name: Deploy Container App

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      azure_resource_group:
        required: true
        type: string
      azure_container_app:
        required: true
        type: string
      image_name:
        required: true
        type: string
      image_tag_alias:
        required: true
        type: string
      next_public_api_url:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy ${{ inputs.environment_name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY_SERVER: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image metadata
        id: image
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE="${REGISTRY_SERVER}/${OWNER_LOWER}/${{ inputs.image_name }}"

          echo "sha_tag=$IMAGE:sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "alias_tag=$IMAGE:${{ inputs.image_tag_alias }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ inputs.next_public_api_url }}
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.alias_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Configure GHCR registry
        run: |
          az containerapp registry set \
            --name "${{ inputs.azure_container_app }}" \
            --resource-group "${{ inputs.azure_resource_group }}" \
            --server "$REGISTRY_SERVER" \
            --username "${{ secrets.GHCR_USERNAME }}" \
            --password "${{ secrets.GHCR_TOKEN }}"

      - name: Deploy revision
        run: |
          az containerapp update \
            --name "${{ inputs.azure_container_app }}" \
            --resource-group "${{ inputs.azure_resource_group }}" \
            --image "${{ steps.image.outputs.sha_tag }}" \
            --set-env-vars \
              NODE_ENV=production \
              NEXT_TELEMETRY_DISABLED=1 \
              PORT=3000 \
              HOSTNAME=0.0.0.0 \
              NEXT_PUBLIC_API_URL="${{ inputs.next_public_api_url }}"

      - name: Print URL
        run: |
          FQDN=$(az containerapp show \
            --name "${{ inputs.azure_container_app }}" \
            --resource-group "${{ inputs.azure_resource_group }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)

          echo "URL: https://$FQDN"